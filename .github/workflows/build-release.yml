name: Build & Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release
        run: swift build -c release

      - name: Create app bundle
        run: bash scripts/create-app-bundle.sh

      - name: Copy icon into bundle
        run: cp Sources/Resources/AppIcon.icns ClaudeSwitch.app/Contents/Resources/AppIcon.icns

      - name: Create DMG
        run: |
          hdiutil create -volName "ClaudeSwitch" \
            -srcfolder ClaudeSwitch.app \
            -ov -format UDZO \
            "ClaudeSwitch-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: "ClaudeSwitch-${{ steps.version.outputs.VERSION }}.dmg"
