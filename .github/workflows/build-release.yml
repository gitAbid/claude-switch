name: Build & Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release
        run: swift build -c release

      - name: Create app bundle
        run: bash scripts/create-app-bundle.sh

      - name: Copy icon into bundle
        run: cp Sources/Resources/AppIcon.icns ClaudeSwitch.app/Contents/Resources/AppIcon.icns

      - name: Codesign app
        run: codesign --force --deep -s - ClaudeSwitch.app

      - name: Install dmgbuild
        run: |
          python3 -m venv /tmp/dmg-env
          source /tmp/dmg-env/bin/activate
          pip install dmgbuild Pillow

      - name: Create DMG installer
        run: |
          source /tmp/dmg-env/bin/activate
          python3 scripts/create-dmg.py "ClaudeSwitch-${{ steps.version.outputs.VERSION }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: "ClaudeSwitch-${{ steps.version.outputs.VERSION }}.dmg"
          body: |
            ## ClaudeSwitch ${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Open the DMG
            2. Drag **ClaudeSwitch** to the **Applications** folder
            3. Open it from Applications or Spotlight

            ### "Cannot be opened" / malware warning?
            This app is not signed with an Apple Developer certificate. To allow it:
            1. Open **System Settings** > **Privacy & Security**
            2. Scroll down and click **Open Anyway** next to the security warning
            3. Or run in Terminal:
               ```
               xattr -cr /Applications/ClaudeSwitch.app
               ```
